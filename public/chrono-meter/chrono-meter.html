<body>

        <div class="timer">
            <h1>Timer</h1>

            <span id="min">00</span>
            <span>:</span>
            <span id="sec">00</span>
            <span>:</span>
            <span id="milsec">00</span><br>
            </div>
            <button id="start" class="button" onclick="start()">start</button>
            <button class="button" onclick="stop()">stop</button>
            <button class="button" onclick="resettimer()">reset</button>
        </div>

<script src="chrono-meter.js"></script>
</body>
